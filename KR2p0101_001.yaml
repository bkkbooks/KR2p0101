body:
  text: 武威漢簡甲本士相見之禮釋文士相見之禮墊冬用雉夏用居左梪奉之曰某也願見無由達某子以命命某見主人𡭊曰某子以命命某見吾子又辱請吾子之就家某將走見賓對曰某不足以辱命請終賜見主人對曰某非敢為儀請吾子之就家某將走見賓對曰某非敢為儀固以請主人對曰某固辭不得命將走見聞吾子稱執敢辭墊賓對曰某不以墊不敢見主人對曰某不足以習禮敢固辭賓對曰某不依于墊不敢見敢固以請主人對曰某固辭不得命敢不從出迎再拜賓合拜主人揖入門右賓奉墊入門左主人拜受賓拜送墊出主人請見賓反見退主人送再拜復見之以某墊曰鄉者吾子辱使某見請還墊於將命者主人對曰某既得見矣敢辭對曰某非敢求見請還墊於將命者主人對曰某既得見矣敢固辭賓對曰某非敢以聞固以請於將命者主人對曰某固辭不得命敢不從賓奉墊入主人拜受賓拜送墊出主人送于門外再拜士見於大夫終辭其墊於其入也一拜其辱也賓退再拜如當為臣者則禮辭其墊賓入鄭墊再拜主人合一拜賓出使擯者還其墊於門外曰某也使某還墊賓對曰某既得見矣敢辭賓擯者曰某使某非敢為儀固以請賓對曰某夫子之賤私也不足以踐禮敢固辭擯者對曰某使某非敢為儀固以請賓對曰某固辭不得命敢不從再拜受下大夫相見以鴈飭之以布維之以索如執雉上大夫相見以睪飾之以布四維之結于面左短麃執之如士相見之禮見于君執墊至下容送俶庶人見于君不為容進退走士大夫則鄭墊再拜稽首答一拜如也國之人則使擯者還其墊賓對曰君不有其外臣臣不敢辭再拜稽首受凡燕見於君必辨君之南面如不得則正方不疑君君在堂升見無方階辨君所在凡言非對也稱而復傳言與君言言使臣與大人言言事君與老者言言使弟子與幼者言言孝弟於父兄與衆言言忠信慈諹與居官者言言忠信凡與大人言始視面中視袍卒視面無改終皆如是如父則游目無上於面無下於帶立則視足坐則視膝凡侍坐於君子君子吹申問曰之蚤宴以食具告改居請退可也夜侍坐問夜膳儀請退可也如君賜之食則君祭先飯呫嘗膳飲而俟君命之食然後食授如有將食者則俟君之食然後食如賜之爵則下席再拜稽首受升席祭卒爵而俟君卒爵而後授虛爵退坐取屢隱辟而後屢君為之興則曰君無為興臣不敢辭君如降送之則不敢顧辭遂出大夫則辭下比及門三辭如先生與爵者請見之則辭不得命則曰某無以見辭不得命將走見先見之非以君命使則不稱寫大夫則曰寡君之恭凡執敝執敝者不趨容彌蹙以為儀執玉者唯𢦶舉前肆踵凡自稱於君士大夫曰下臣詫者在國則曰市井之臣在野則曰草茅之臣庶人則曰刺草之臣也國之人則曰外臣凡千二十字
